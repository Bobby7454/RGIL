<style>
*{box-sizing:border-box;margin:0;padding:0}
.lw{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:9999;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background:rgba(8,12,22,0.45);
}
.corner{position:absolute;width:12px;height:12px;border-color:rgba(200,151,58,0.25);border-style:solid}
.corner-tl{top:32px;left:32px;border-width:1px 0 0 1px}
.corner-tr{top:32px;right:32px;border-width:1px 1px 0 0}
.corner-bl{bottom:32px;left:32px;border-width:0 0 1px 1px}
.corner-br{bottom:32px;right:32px;border-width:0 1px 1px 0}
.icon-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.prog-svg{position:absolute;width:120px;height:120px}
.prog-track{stroke:rgba(200,151,58,0.12)}
.prog-fill{
  stroke:#c8973a;stroke-linecap:round;
  stroke-dasharray:314;stroke-dashoffset:80;
  animation:spinArc 1.6s cubic-bezier(0.4,0,0.6,1) infinite;
  transform-origin:center;
}
@keyframes spinArc{
  0%{transform:rotate(0deg);stroke-dashoffset:80}
  50%{stroke-dashoffset:250}
  100%{transform:rotate(360deg);stroke-dashoffset:80}
}
.scale-svg{position:absolute;width:64px;height:64px}
.shimmer-line{
  position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);
  width:1px;height:24px;
  background:linear-gradient(to bottom,rgba(200,151,58,0.7),transparent);
}
.text-block{
  position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);
  text-align:center;white-space:nowrap;
}
.text-block span{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(200,151,58,0.85);display:block;margin-bottom:8px;
}
.dots{display:flex;justify-content:center;gap:6px}
.dot{width:4px;height:4px;border-radius:50%;background:#c8973a;opacity:.2;animation:dp 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.25s}
.dot:nth-child(3){animation-delay:.5s}
@keyframes dp{0%,100%{opacity:.2}50%{opacity:.9}}
</style>

<div class="lw" id="loader">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="icon-wrap">
    <svg class="prog-svg" viewBox="0 0 120 120">
      <circle class="prog-track" cx="60" cy="60" r="50" fill="none" stroke-width="1.2"/>
      <circle class="prog-fill" cx="60" cy="60" r="50" fill="none" stroke-width="1.2"/>
    </svg>
    <svg class="scale-svg" viewBox="0 0 64 64" id="scaleSvg">
      <line x1="32" y1="20" x2="32" y2="52" stroke="#c8973a" stroke-width="1.3"/>
      <line x1="22" y1="52" x2="42" y2="52" stroke="#c8973a" stroke-width="1.3"/>
      <circle cx="32" cy="18" r="2" fill="none" stroke="#c8973a" stroke-width="1"/>
      <line id="beam" x1="10" y1="18" x2="54" y2="18" stroke="#c8973a" stroke-width="1.1"/>
      <line id="lChain" x1="10" y1="18" x2="10" y2="30" stroke="#c8973a" stroke-width="0.9"/>
      <path id="lPan" d="M6 30 Q10 35 14 30Z" stroke="#c8973a" stroke-width="0.9" fill="rgba(200,151,58,0.15)"/>
      <line id="rChain" x1="54" y1="18" x2="54" y2="30" stroke="#c8973a" stroke-width="0.9"/>
      <path id="rPan" d="M50 30 Q54 35 58 30Z" stroke="#c8973a" stroke-width="0.9" fill="rgba(200,151,58,0.15)"/>
    </svg>
    <div class="shimmer-line"></div>
    <div class="text-block">
      <span>Loading</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const DEG = Math.PI / 180;
  const PAN_AMP = 12;     // swing angle
  const PERIOD = 2000;

  const beam = document.getElementById('beam');
  const lChain = document.getElementById('lChain');
  const rChain = document.getElementById('rChain');
  const lPan = document.getElementById('lPan');
  const rPan = document.getElementById('rPan');

  function animate(t) {
    const phase = (t % PERIOD) / PERIOD * 2 * Math.PI;

    const angle = Math.sin(phase) * PAN_AMP * DEG;
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    const lx = 32 + (10 - 32) * cosA;
    const ly = 18 + (10 - 32) * sinA;

    const rx = 32 + (54 - 32) * cosA;
    const ry = 18 + (54 - 32) * sinA;

    const lCy = ly + 12;
    const rCy = ry + 12;

    beam.setAttribute('x1', lx);
    beam.setAttribute('y1', ly);
    beam.setAttribute('x2', rx);
    beam.setAttribute('y2', ry);

    lChain.setAttribute('x1', lx);
    lChain.setAttribute('y1', ly);
    lChain.setAttribute('x2', lx);
    lChain.setAttribute('y2', lCy);

    rChain.setAttribute('x1', rx);
    rChain.setAttribute('y1', ry);
    rChain.setAttribute('x2', rx);
    rChain.setAttribute('y2', rCy);

    const w = 4;
    lPan.setAttribute('d', `M${lx-w} ${lCy} Q${lx} ${lCy+5} ${lx+w} ${lCy}Z`);
    rPan.setAttribute('d', `M${rx-w} ${rCy} Q${rx} ${rCy+5} ${rx+w} ${rCy}Z`);

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();
</script>
